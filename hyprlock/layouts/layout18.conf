# Step Backward
label {
    monitor =
    text = ÔĀą
    onclick = playerctl -p spotify previous
    color = rgba(192, 202, 245, 1)
    font_size = 25
    position = -60, -150
    halign = center
    valign = center
    zindex = 5
}

# PLAYER STATUS
label {
    monitor =
    text = cmd[update:1000] echo "$($music --status)"
    onclick = playerctl -p spotify play-pause
    color = rgba(192, 202, 245, 1)
    font_size = 21
    position = 0, -150
    halign = center
    valign = center
    zindex = 5
}

# Step Forward
label {
    monitor =
    text = ÔĀĎ
    onclick = playerctl -p spotify next
    color = rgba(192, 202, 245, 1)
    font_size = 25
    position = 60, -150
    halign = center
    valign = center
    zindex = 5
}
