## в–Ҳв–„в–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
## в–Ҳв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
#################
##### APPS  #####
#################
bind = $mainMod, Q, exec, $terminal # kitty
bind = $mainMod, Y, exec, $terminal -e yazi # yazi
bind = $mainMod, B, exec, $browser # firefox
bind = $mainMod, N, exec, $notificationCenter #swaync
bind = $mainMod, M, exec, ~/Downloads/ElyPrismLauncher-Linux-x86_64.AppImage & # minecraft launcher
bind = $mainMod, E, exec, $fileManager # thunar
bind = $mainMod, R, exec, $menu # rofi
bind = $mainMod, W, exec, wifi-manager --toggle # wifi manager
# Walt section
# bind = $mainMod SHIFT, D, exec, kitty --class walt -e walt
# bind = $mainMod CTRL, D, exec, walt gui
# bind = $mainMod, D, exec, walt random

################
### SCRIPTS  ###
################
bind = $mainMod, A, exec, ~/.config/waybar/scripts/launch.sh # kill waybar
bind = $mainMod, L, exec, ~/.config/hyprlock/scripts/hyprlock.sh # hyprlock
bind = $mainMod CTRL, P, exec, quickshell -c hyprquickshot -n # quickshot (screenshot gui)
bind = $mainMod CTRL, Q, exec, ~/.config/rofi/wall-launcher/wallpaper_select.sh
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod SHIFT, C, exec, lvsk-calendar-launcher
bind = $mainMod CTRL, X, exec, ~/.config/rofi/color-schema/color-schema.sh

########################
### WINDOWS FLOATING ###
########################
bind = $mainMod, T, togglefloating # toggle floating/tiled for the active window
bind = $mainMod, F, fullscreen # toggle fullscreen for the active window
# bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit # vertical/horizontal split
bind = $mainMod, C, killactive, # kill the active window

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize active window
binde = $mainMod SHIFT ALT, right, resizeactive, 30 0
binde = $mainMod SHIFT ALT, left, resizeactive, -30 0
binde = $mainMod SHIFT ALT, up, resizeactive, 0 -30
binde = $mainMod SHIFT ALT, down, resizeactive, 0 30

# Move workspace up/down
bind = CTRL $mainMod, up, workspace, r-1
bind = CTRL $mainMod, down, workspace, r+1
bind = $mainMod CTRL ALT, up, movetoworkspace, r-1
bind = $mainMod CTRL ALT, down, movetoworkspace, r+1

# Move window with mainMod + Ctrl + Shift
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ===============================
# Multimedia keys + OSD (swayosd)
# ===============================

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h string:x-canonical-private-synchronous:volume -h int:value:$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}') "Volumen" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}')%"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h string:x-canonical-private-synchronous:volume -h int:value:$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}') "Volumen" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}')%"

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -h string:x-canonical-private-synchronous:volume "Audio" "Mute"

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -d intel_backlight set 5%+ && notify-send -h string:x-canonical-private-synchronous:brightness -h int:value:$(brightnessctl -m | cut -d, -f4 | tr -d '%') "Brightmess" "$(brightnessctl -m | cut -d, -f4)"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -d intel_backlight set 5%- && notify-send -h string:x-canonical-private-synchronous:brightness -h int:value:$(brightnessctl -m | cut -d, -f4 | tr -d '%') "Brightmess" "$(brightnessctl -m | cut -d, -f4)"

##############
### GROUPS ###
##############
bind = $mainMod, G, togglegroup, # toggle the window between focus and group
# Move between grouped windows
bind = $mainMod CTRL , H, changegroupactive, b
bind = $mainMod CTRL , L, changegroupactive, f

##########################
### special workspaces ###
##########################
# Obsidian (notes)
bind = $mainMod, 1, togglespecialworkspace, terminals
bind = $mainMod CTRL, 1, movetoworkspace, special:terminals

# Visual Studio Code (code)
bind = $mainMod, 2, togglespecialworkspace, apps
bind = $mainMod CTRL, 2, movetoworkspace, special:apps

# Visual Studio Code (code)
bind = $mainMod, 3, togglespecialworkspace, files
bind = $mainMod CTRL, 3, movetoworkspace, special:files
