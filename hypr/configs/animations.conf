# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true
    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, easeOut, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, linear, loop
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, overshot, slidevert

    # animation = hyprfocusIn,  1, 1, default
    # animation = hyprfocusOut, 1, 1, default
}